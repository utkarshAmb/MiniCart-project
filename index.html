<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniStore — a full-stack storefront demo</title>
  <meta name="description"
    content="MiniStore is a front-end eCommerce demo built with HTML, CSS, Bootstrap, and vanilla JavaScript." />
  <link rel="icon" href="./logo2.png" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="./style.css" rel="stylesheet" />
</head>

<body>
  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="container-xl header-inner">
      <a class="brand" href="#" aria-label="MiniStore home">
        <img class="brand-logo" src="./logo2.png" alt="" />
        <span class="brand-name">MiniStore</span>
      </a>

      <form class="search" role="search" id="search-form" autocomplete="off">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input id="search-input" type="search" name="q" placeholder="Search products" aria-label="Search products" />
      </form>

      <div class="header-actions">
        <button class="icon-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartDrawer"
          aria-label="Open cart">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-badge" id="cart-count" hidden>0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== Hero carousel ===== -->
  <section class="hero container-xl">
    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-indicators">
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"
          aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
      </div>
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="./carousel_1.jpg" alt="Welcome to MiniStore" />
          <!-- <div class="carousel-caption">
            <h2>An end-to-end storefront demo</h2>
            <p>From product discovery to checkout, built to show clean UI and full-stack front-end work.</p>
          </div> -->
        </div>
        <div class="carousel-item">
          <img src="./carousel_2.jpg" alt="Built with HTML, CSS, Bootstrap, and JavaScript" />
          <!-- <div class="carousel-caption">
            <h2>HTML · CSS · Bootstrap · JavaScript</h2>
            <p>No frameworks — just a hand-built component system and vanilla JavaScript.</p>
          </div> -->
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </section>

  <!-- ===== Main: sidebar + catalog ===== -->
  <main class="container-xl layout">
    <aside class="sidebar" aria-label="Filters">
      <h3>Categories</h3>
      <ul class="filter-list" id="category-list">
        <!-- populated by JS -->
      </ul>
      <hr />
      <div class="sort-field">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: low to high</option>
          <option value="price-desc">Price: high to low</option>
          <option value="name">Name: A to Z</option>
        </select>
      </div>
    </aside>

    <section class="catalog" aria-label="Products">
      <div class="catalog-head">
        <h2 id="catalog-title">All products</h2>
        <span class="result-count" id="result-count"></span>
      </div>

      <div class="product-grid" id="products"></div>

      <div class="empty-state" id="no-results" hidden>
        <h3>No products match your search</h3>
        <p>Try a different keyword or clear the filters to see everything.</p>
        <button class="btn-ghost" type="button" id="clear-filters">Clear filters</button>
      </div>
    </section>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <div class="container-xl footer-inner">
      <span class="brand-name">MiniStore</span>
      <span>Front-end eCommerce demo · HTML, CSS, Bootstrap &amp; vanilla JavaScript</span>
    </div>
  </footer>

  <!-- ===== Cart drawer ===== -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartDrawer" aria-labelledby="cartDrawerLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="cartDrawerLabel">Your cart</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
      <div class="cart-body" id="cart-lines"><!-- populated by JS --></div>
      <div class="cart-foot" id="cart-foot" hidden>
        <div class="cart-summary">
          <span class="label">Total</span>
          <span class="total" id="cart-total">$0.00</span>
        </div>
        <button class="btn-solid btn-block" type="button" id="checkout-btn">Checkout</button>
      </div>
    </div>
  </div>

  <!-- ===== Product detail modal ===== -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content position-relative">
        <button type="button" class="btn-close modal-close" data-bs-dismiss="modal" aria-label="Close"></button>
        <div class="modal-grid">
          <div class="modal-media">
            <img id="modal-image" src="" alt="" />
          </div>
          <div class="modal-info">
            <span class="product-tag" id="modal-category"></span>
            <h3 id="modal-title"></h3>
            <div class="price" id="modal-price"></div>
            <p id="modal-description"></p>
            <button class="btn-add btn-block" type="button" id="modal-add">Add to cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Product card template ===== -->
  <template id="product-card-template">
    <article class="product-card">
      <div class="product-media">
        <span class="product-tag"></span>
        <img class="product-image" src="" alt="" loading="lazy" />
      </div>
      <div class="product-body">
        <h3 class="product-title"></h3>
        <div class="product-price"></div>
        <div class="product-actions">
          <button type="button" class="btn-ghost btn-view">View</button>
          <button type="button" class="btn-add btn-add-trigger">Add to cart</button>
        </div>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="./index.js"></script>
</body>

</html>
